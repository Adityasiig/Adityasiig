name: metrics

on:
  # daily refresh
  schedule:
    - cron: "0 0 * * *"
  # run on push to main
  push:
    branches:
      - main
  # manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── 1.  isometric 3D contribution calendar (full year) ────────────
      - name: isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
